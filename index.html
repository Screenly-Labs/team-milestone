<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9L7Y81VT6Z"></script>
    <script>
      window.dataLayer = window.dataLayer || []
      function gtag() {
        dataLayer.push(arguments)
      }
      gtag('js', new Date())
      gtag('config', 'G-9L7Y81VT6Z')
    </script>
    <title>Team Milestone</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A full-screen team-milestone celebration for digital signage — a big milestone value for a named team, under a shower of confetti."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M16 4l3.1 6.5 7 1-5.1 5 1.2 7-6.2-3.4L9.8 23.5l1.2-7-5.1-5 7-1z' fill='%23f6c453' stroke='%23caa63a' stroke-width='0.6' stroke-linejoin='round'/%3E%3C/svg%3E"
    />
    <link
      rel="preload"
      href="/static/fonts/bricolage-grotesque-latin-standard-normal.woff2?v=__ASSET_VERSION__"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/static/fonts/hanken-grotesk-latin-wght-normal.woff2?v=__ASSET_VERSION__"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="/static/styles/main.css?v=__ASSET_VERSION__" />
    <script src="/static/js/main.js?v=__ASSET_VERSION__" defer></script>
  </head>
  <body>
    <main class="stage">
      <!-- Confetti scraps are injected here by JS; empty (and inert) pre-JS. -->
      <div class="confetti" id="confetti" aria-hidden="true"></div>

      <section class="card" aria-labelledby="value">
        <!-- Static example keeps the card legible pre-JS and in the store preview;
             JS rewrites it from the launch URL's query string. -->
        <p class="card__team" id="team">Team Phoenix</p>
        <h1 class="card__value" id="value">5 Years</h1>
        <p class="card__label" id="label">of building together</p>
        <p class="card__message" id="message">
          Thank you for every late night, every launch, and every win.
        </p>
        <p class="card__date" id="date">July 2026</p>
      </section>

      <a
        class="brand"
        href="https://www.screenly.io"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Screenly (opens in a new tab)"
      >
        <img src="/static/images/screenly-logo.svg?v=__ASSET_VERSION__" alt="Screenly" />
      </a>
    </main>
  </body>
</html>
